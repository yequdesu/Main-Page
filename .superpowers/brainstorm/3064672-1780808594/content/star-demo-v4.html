<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometric Star Demo v4 — Chaotic Corona + Edge-thickening</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080c14; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 24px; left: 0; right: 0; text-align: center;
    color: #64748b; font-size: 13px; pointer-events: none; z-index: 10;
  }
  #info span { color: #9ca3af; }
</style>
</head>
<body>
<div id="info">透明球 <span>·</span> 混沌表面曲线 <span>·</span> 日冕扰动 <span>·</span> 边缘加粗射线/粒子</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.170.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color('#080c14');
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.5, 80);
camera.position.set(0, 0.25, 8);
camera.lookAt(0, -1.0, -16);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Orbit rings
const cx=0, cy=-1.0, cz=-16;
[3.6, 5.0, 6.4].forEach(r => {
  const pts=[];
  for(let i=0;i<=128;i++){ const a=(i/128)*Math.PI*2; pts.push(new THREE.Vector3(cx+Math.cos(a)*r, cy, cz+Math.sin(a)*r)); }
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:'#1e293b',transparent:true,opacity:0.3,depthTest:true})));
});

const COLOR_SPHERE = '#4b5563';
const COLOR_CURVE  = '#9ca3af';
const COLOR_RAY    = '#a8b4c0';
const COLOR_PARTICLE = '#bcc7d4';

// ══════════════════════════════════════════════════
//  STAR GROUP
// ══════════════════════════════════════════════════
const starGroup = new THREE.Group();
starGroup.position.set(0, -1.0, -16);
starGroup.renderOrder = 0;
scene.add(starGroup);

// ── Transparent sphere ───────────────────────────
const SPHERE_R = 0.55;
const sphereGeo = new THREE.SphereGeometry(SPHERE_R, 64, 48);
const sphereMat = new THREE.MeshBasicMaterial({
  color: COLOR_SPHERE, transparent: true, opacity: 0.12, depthWrite: true, depthTest: true
});
const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
sphereMesh.renderOrder = 0;
starGroup.add(sphereMesh);

// Subtle wireframe overlay for structure
const wireOverlay = new THREE.LineSegments(
  new THREE.EdgesGeometry(new THREE.IcosahedronGeometry(SPHERE_R, 3)),
  new THREE.LineBasicMaterial({ color: '#374151', transparent: true, opacity: 0.2, depthTest: true })
);
wireOverlay.renderOrder = 1;
starGroup.add(wireOverlay);

// ══════════════════════════════════════════════════
//  CHAOTIC SURFACE CURVES — dynamic writhing lines
//  partially on sphere surface, with normal perturbations
// ══════════════════════════════════════════════════
const CURVE_COUNT = 18;
const CURVE_PTS = 50;  // points per curve
const curveLines = [];
const curveData = [];

// Pre-allocated scratch vectors
const _ptOnSphere = new THREE.Vector3();
const _ptNormal = new THREE.Vector3();
const _ptOffset = new THREE.Vector3();

// Simple hash for pseudo-random noise
function hash3D(x, y, z) {
  let h = x * 374761393 + y * 668265263 + z * 1440676273;
  h = (h ^ (h >> 13)) * 1274126177;
  h = h ^ (h >> 16);
  return (h & 0x7fffffff) / 0x7fffffff;
}

// Smooth noise via trilinear interpolation of hash3D
function noise3D(x, y, z) {
  const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
  const fx = x - ix, fy = y - iy, fz = z - iz;
  const sx = fx * fx * (3 - 2*fx), sy = fy * fy * (3 - 2*fy), sz = fz * fz * (3 - 2*fz);
  const c000 = hash3D(ix, iy, iz);
  const c100 = hash3D(ix+1, iy, iz);
  const c010 = hash3D(ix, iy+1, iz);
  const c110 = hash3D(ix+1, iy+1, iz);
  const c001 = hash3D(ix, iy, iz+1);
  const c101 = hash3D(ix+1, iy, iz+1);
  const c011 = hash3D(ix, iy+1, iz+1);
  const c111 = hash3D(ix+1, iy+1, iz+1);
  const a = c000 + sx*(c100-c000);
  const b = c010 + sx*(c110-c010);
  const c = a + sy*(b-a);
  const d = c001 + sx*(c101-c001);
  const e = c011 + sx*(c111-c011);
  const f = d + sy*(e-d);
  return c + sz*(f-c);
}

function fbm(x, y, z, octaves=3) {
  let val=0, amp=1, freq=1, max=0;
  for(let o=0;o<octaves;o++){
    val += noise3D(x*freq, y*freq, z*freq) * amp;
    max += amp;
    amp *= 0.5;
    freq *= 2.0;
  }
  return val / max;
}

for (let c = 0; c < CURVE_COUNT; c++) {
  // Each curve is a great-circle-like path with random orientation
  const axis = new THREE.Vector3(Math.random()*2-1, Math.random()*2-1, Math.random()*2-1).normalize();
  const perp = new THREE.Vector3(1,0,0);
  if (Math.abs(axis.dot(perp)) > 0.9) perp.set(0,1,0);
  const u = new THREE.Vector3().crossVectors(axis, perp).normalize();
  const v = new THREE.Vector3().crossVectors(axis, u).normalize();

  // Phase offsets for animation
  const phase = Math.random() * Math.PI * 2;
  const speed = 0.3 + Math.random() * 0.9;
  const noiseScale = 0.8 + Math.random() * 1.5;
  const perturbStrength = 0.08 + Math.random() * 0.22;  // how far off surface it goes
  const noiseSpeed = 0.4 + Math.random() * 1.2;

  const positions = new Float32Array(CURVE_PTS * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setDrawRange(0, CURVE_PTS);

  const mat = new THREE.LineBasicMaterial({
    color: COLOR_CURVE, transparent: true, opacity: 0.4 + Math.random() * 0.3, depthTest: true
  });
  const line = new THREE.Line(geo, mat);
  line.renderOrder = 2;
  line.frustumCulled = false;
  starGroup.add(line);
  curveLines.push(line);

  curveData.push({ axis, u, v, phase, speed, noiseScale, perturbStrength, noiseSpeed, positions });
}

// ══════════════════════════════════════════════════
//  RAY SYSTEM — with edge-thickening via varying opacity
// ══════════════════════════════════════════════════
const RAY_COUNT = 50;
const RAY_SPHERE_R = SPHERE_R + 0.03;
const RAY_MAX_DIST = 14.0;
const RAY_MAX_AGE = 3.5;

const rayGroup = new THREE.Group();
rayGroup.renderOrder = 3;
starGroup.add(rayGroup);

const fiboDirs = [];
const phi_g = Math.PI*(3-Math.sqrt(5));
for(let i=0;i<120;i++){
  const y=1-(i/119)*2, rAtY=Math.sqrt(1-y*y), theta=phi_g*i;
  fiboDirs.push(new THREE.Vector3(Math.cos(theta)*rAtY, y, Math.sin(theta)*rAtY).normalize());
}

function easeInQuart(t){ return t*t*t*t; }

const rays=[];
const _rs=new THREE.Vector3(), _re=new THREE.Vector3();

// Screen-space projection scratch
const _ssProj = new THREE.Vector3();

function spawnRay(i){
  const dir=fiboDirs[i%120].clone();
  dir.x+=(Math.random()-0.5)*0.2; dir.y+=(Math.random()-0.5)*0.2; dir.z+=(Math.random()-0.5)*0.2;
  dir.normalize();
  const geo=new THREE.BufferGeometry().setFromPoints([dir.clone().multiplyScalar(RAY_SPHERE_R), dir.clone().multiplyScalar(RAY_SPHERE_R+0.01)]);
  const mat=new THREE.LineBasicMaterial({color:COLOR_RAY,transparent:true,opacity:0,depthTest:true});
  const line=new THREE.Line(geo,mat); line.renderOrder=3; line.frustumCulled=false;
  rayGroup.add(line);
  return {line,mat,dir,age:Math.random()*RAY_MAX_AGE,maxAge:RAY_MAX_AGE*(0.8+Math.random()*0.4)};
}
for(let i=0;i<RAY_COUNT;i++) rays.push(spawnRay(i));

// ══════════════════════════════════════════════════
//  PARTICLE SYSTEM — edge-thickening via ShaderMaterial
// ══════════════════════════════════════════════════
const PARTICLE_COUNT = 50;
const PARTICLE_MAX_DIST = 12.0;
const PARTICLE_MAX_AGE = 3.2;
const TRAIL_LENGTH = 14;

// Edge-thickening particle shader
const edgeParticleShader = {
  uniforms: {
    uScreenCenter: { value: new THREE.Vector2(0.5, 0.5) },
    uEdgeScale: { value: 2.5 }
  },
  vertexShader: `
    attribute float size;
    varying float vDistFromCenter;
    varying vec3 vWorldPos;
    uniform vec2 uScreenCenter;
    void main() {
      vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
      vec4 projPos = projectionMatrix * mvPosition;
      gl_Position = projPos;
      // Distance from screen center in NDC
      vec2 ndc = projPos.xy / projPos.w;
      vDistFromCenter = length(ndc);
      gl_PointSize = size * (1.0 + vDistFromCenter * 2.5);
      vWorldPos = position;
    }
  `,
  fragmentShader: `
    varying float vDistFromCenter;
    varying vec3 vWorldPos;
    uniform float uEdgeScale;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if (d > 1.0) discard;
      float alpha = 1.0 - smoothstep(0.0, 1.0, d);
      alpha = pow(alpha, 1.2);
      // Edge brightening
      float edgeBoost = 1.0 + vDistFromCenter * 0.6;
      gl_FragColor = vec4(1.0, 1.0, 1.0, alpha * edgeBoost * 0.85);
    }
  `
};

// Canvas dot texture for the shader is not needed — we draw soft circles in the shader

const particleGroup = new THREE.Group();
particleGroup.renderOrder = 4;
starGroup.add(particleGroup);

const particles = [];

function spawnParticle(i){
  const dir=fiboDirs[i%120].clone();
  dir.x+=(Math.random()-0.5)*0.35; dir.y+=(Math.random()-0.5)*0.35; dir.z+=(Math.random()-0.5)*0.35;
  dir.normalize();

  // Main point with shader material
  const geo = new THREE.BufferGeometry();
  const posArr = new Float32Array([dir.x*RAY_SPHERE_R, dir.y*RAY_SPHERE_R, dir.z*RAY_SPHERE_R]);
  geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(new Float32Array([5.0]), 1));
  const mat = new THREE.ShaderMaterial({
    uniforms: { uScreenCenter: {value: new THREE.Vector2(0.5,0.5)}, uEdgeScale: {value:2.5} },
    vertexShader: edgeParticleShader.vertexShader,
    fragmentShader: edgeParticleShader.fragmentShader,
    transparent: true, depthWrite: false, depthTest: true, blending: THREE.AdditiveBlending
  });
  const point = new THREE.Points(geo, mat);
  point.renderOrder = 4; point.frustumCulled = false;
  particleGroup.add(point);

  // Trail
  const trailArr = new Float32Array(TRAIL_LENGTH*3);
  const s = dir.clone().multiplyScalar(RAY_SPHERE_R);
  for(let j=0;j<TRAIL_LENGTH;j++){trailArr[j*3]=s.x;trailArr[j*3+1]=s.y;trailArr[j*3+2]=s.z;}
  const trailGeo=new THREE.BufferGeometry();
  trailGeo.setAttribute('position',new THREE.BufferAttribute(trailArr,3));
  const trailMat=new THREE.LineBasicMaterial({color:COLOR_PARTICLE,transparent:true,opacity:0,depthTest:true});
  const trail=new THREE.Line(trailGeo,trailMat); trail.renderOrder=3; trail.frustumCulled=false;
  particleGroup.add(trail);

  return {point,trail,trailArr,trailMat,dir,age:Math.random()*PARTICLE_MAX_AGE,maxAge:PARTICLE_MAX_AGE*(0.8+Math.random()*0.4)};
}
for(let i=0;i<PARTICLE_COUNT;i++) particles.push(spawnParticle(i));

// ══════════════════════════════════════════════════
//  ANIMATION
// ══════════════════════════════════════════════════
const clock = new THREE.Clock();
const _starWorldPos = new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  const t = clock.getElapsedTime();

  starGroup.rotation.y += dt * 0.08;

  // ── Update screen center for edge-thickening ────
  starGroup.getWorldPosition(_starWorldPos);
  _starWorldPos.project(camera);
  const scx = (_starWorldPos.x + 1) / 2;
  const scy = (_starWorldPos.y + 1) / 2;
  for (const p of particles) {
    p.point.material.uniforms.uScreenCenter.value.set(scx, scy);
  }

  // ── Chaotic surface curves ─────────────────────
  for (let c = 0; c < CURVE_COUNT; c++) {
    const cd = curveData[c];
    const { axis, u, v, phase, speed, noiseScale, perturbStrength, noiseSpeed, positions } = cd;
    const arr = positions;

    for (let i = 0; i < CURVE_PTS; i++) {
      // Parametric angle along a great-circle-like path, with wobble
      const frac = i / (CURVE_PTS - 1);
      const angle = frac * Math.PI * 2;

      // Base position on sphere via rotation around axis
      // Use u,v as basis vectors
      const cosA = Math.cos(angle);
      const sinA = Math.sin(angle);

      _ptOnSphere.set(
        u.x * cosA + v.x * sinA,
        u.y * cosA + v.y * sinA,
        u.z * cosA + v.z * sinA
      ).normalize();

      // Tangential noise for surface wandering
      const nx = _ptOnSphere.x, ny = _ptOnSphere.y, nz = _ptOnSphere.z;
      const noiseVal = fbm(nx*noiseScale + t*noiseSpeed, ny*noiseScale, nz*noiseScale + t*0.3, 3);

      // Normal perturbation: lift off surface
      _ptNormal.copy(_ptOnSphere).normalize();
      const perturb = (noiseVal - 0.5) * 2.0 * perturbStrength;
      // Add time-varying bursts
      const burst = Math.max(0, Math.sin(t * (2.5 + c * 0.7) + frac * 8.0 + phase)) * 0.15;
      const totalPerturb = perturb + burst * perturbStrength * 2.0;

      _ptOffset.copy(_ptOnSphere)
        .multiplyScalar(SPHERE_R)
        .addScaledVector(_ptNormal, totalPerturb);

      // Add tangential wobble
      const wobble = Math.sin(t * 3.0 + frac * 12.0 + phase) * 0.03;
      const tangent = new THREE.Vector3().crossVectors(_ptNormal, u).normalize();
      _ptOffset.addScaledVector(tangent, wobble);

      arr[i*3] = _ptOffset.x;
      arr[i*3+1] = _ptOffset.y;
      arr[i*3+2] = _ptOffset.z;
    }
    curveLines[c].geometry.attributes.position.needsUpdate = true;

    // Opacity variation
    curveLines[c].material.opacity = 0.3 + Math.sin(t * speed + phase) * 0.15 + Math.abs(Math.sin(t * 1.7 + c)) * 0.1;
  }

  // ── Rays ───────────────────────────────────────
  for(const ray of rays){
    ray.age+=dt;
    if(ray.age>=ray.maxAge){
      ray.age=0; ray.maxAge=RAY_MAX_AGE*(0.8+Math.random()*0.4);
      const idx=Math.floor(Math.random()*120);
      ray.dir.copy(fiboDirs[idx]);
      ray.dir.x+=(Math.random()-0.5)*0.2; ray.dir.y+=(Math.random()-0.5)*0.2; ray.dir.z+=(Math.random()-0.5)*0.2;
      ray.dir.normalize();
    }
    const tN=ray.age/ray.maxAge;
    const eased=easeInQuart(tN);
    const dist=RAY_SPHERE_R+eased*RAY_MAX_DIST;

    // Calculate screen distance for edge thickening (via opacity)
    _rs.copy(ray.dir).multiplyScalar(dist);
    starGroup.localToWorld(_rs);
    _rs.project(camera);
    const screenDist = Math.sqrt(
      (_rs.x - scx*2 + 1)*(_rs.x - scx*2 + 1) + (_rs.y - scy*2 + 1)*(_rs.y - scy*2 + 1)
    );

    const distFade=1/(1+eased*4.5);
    const lifeFade=tN>0.85?1-(tN-0.85)/0.15:1;
    const edgeBoost=1+screenDist*1.2;
    ray.mat.opacity=distFade*lifeFade*0.6*edgeBoost;

    _rs.copy(ray.dir).multiplyScalar(RAY_SPHERE_R);
    _re.copy(ray.dir).multiplyScalar(dist);
    ray.line.geometry.dispose();
    ray.line.geometry=new THREE.BufferGeometry().setFromPoints([_rs.clone(),_re.clone()]);
  }

  // ── Particles ──────────────────────────────────
  for(const p of particles){
    p.age+=dt;
    if(p.age>=p.maxAge){
      p.age=0; p.maxAge=PARTICLE_MAX_AGE*(0.8+Math.random()*0.4);
      const idx=Math.floor(Math.random()*120);
      p.dir.copy(fiboDirs[idx]);
      p.dir.x+=(Math.random()-0.5)*0.35; p.dir.y+=(Math.random()-0.5)*0.35; p.dir.z+=(Math.random()-0.5)*0.35;
      p.dir.normalize();
      const s=p.dir.clone().multiplyScalar(RAY_SPHERE_R);
      for(let j=0;j<TRAIL_LENGTH;j++){p.trailArr[j*3]=s.x;p.trailArr[j*3+1]=s.y;p.trailArr[j*3+2]=s.z;}
    }
    const tN=p.age/p.maxAge;
    const eased=easeInQuart(tN);
    const dist=RAY_SPHERE_R+eased*PARTICLE_MAX_DIST;

    const px=p.dir.x*dist, py=p.dir.y*dist, pz=p.dir.z*dist;
    p.point.geometry.attributes.position.array[0]=px;
    p.point.geometry.attributes.position.array[1]=py;
    p.point.geometry.attributes.position.array[2]=pz;
    p.point.geometry.attributes.position.needsUpdate=true;

    // Shift trail
    for(let j=TRAIL_LENGTH-1;j>0;j--){
      p.trailArr[j*3]=p.trailArr[(j-1)*3];
      p.trailArr[j*3+1]=p.trailArr[(j-1)*3+1];
      p.trailArr[j*3+2]=p.trailArr[(j-1)*3+2];
    }
    p.trailArr[0]=px; p.trailArr[1]=py; p.trailArr[2]=pz;
    p.trail.geometry.attributes.position.needsUpdate=true;

    // Edge thickening via size uniform
    _ssProj.set(px, py, pz);
    starGroup.localToWorld(_ssProj);
    _ssProj.project(camera);
    const ssDist = Math.sqrt(
      (_ssProj.x - scx*2 + 1)*(_ssProj.x - scx*2 + 1) +
      (_ssProj.y - scy*2 + 1)*(_ssProj.y - scy*2 + 1)
    );
    const baseSize = 4.0 + ssDist * 8.0;
    p.point.geometry.attributes.size.array[0] = baseSize;
    p.point.geometry.attributes.size.needsUpdate = true;

    const distFade=1/(1+eased*3.8);
    const lifeFade=tN>0.85?1-(tN-0.85)/0.15:1;
    const edgeBoost=1+ssDist*0.5;
    p.point.material.uniforms.uEdgeScale.value = 2.5 + ssDist * 3.0;
    p.point.material.opacity = distFade * lifeFade * 0.7 * edgeBoost;
    p.trailMat.opacity = distFade * lifeFade * 0.3 * edgeBoost;
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
