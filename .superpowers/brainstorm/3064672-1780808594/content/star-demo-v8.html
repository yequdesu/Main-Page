<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometric Star Demo v8 — Patterned Rings (fixed)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f1f5f9; overflow: hidden; font-family: system-ui, sans-serif; }
  canvas { display: block; }
  #info {
    position: fixed; bottom: 24px; left: 0; right: 0; text-align: center;
    color: #94a3b8; font-size: 13px; pointer-events: none; z-index: 10;
  }
  #info span { color: #64748b; }
</style>
</head>
<body>
<div id="info">星核 <span>·</span> 游走曲线 <span>·</span> 放射楔形环 <span>·</span> 柱体射线 <span>·</span> 拖尾粒子</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.170.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color('#f1f5f9');
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.5, 80);
camera.position.set(0, 0.25, 8);
camera.lookAt(0, -1.0, -16);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Orbit rings — in scene (not starGroup) so they stay fixed
const cx=0, cy=-1.0, cz=-16;
[3.6, 5.0, 6.4].forEach(r => {
  const pts=[];
  for(let i=0;i<=128;i++){ const a=(i/128)*Math.PI*2; pts.push(new THREE.Vector3(cx+Math.cos(a)*r, cy, cz+Math.sin(a)*r)); }
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color:'#cbd5e1',transparent:true,opacity:0.55,depthTest:true})));
});

const COLOR_CORE   = '#000000';
const COLOR_CURVE  = '#1e293b';
const COLOR_RAY    = '#334155';
const COLOR_PARTICLE = '#334155';

// ══════════════════════════════════════════════════
//  STAR GROUP
// ══════════════════════════════════════════════════
const starGroup = new THREE.Group();
starGroup.position.set(0, -1.0, -16);
starGroup.renderOrder = 0;
scene.add(starGroup);

const SPHERE_R = 0.55;
const CORE_R = 0.12;

// Tiny black core
const coreGeo = new THREE.SphereGeometry(CORE_R, 32, 24);
const coreMat = new THREE.MeshBasicMaterial({ color: COLOR_CORE, depthWrite: true, depthTest: true });
starGroup.add(new THREE.Mesh(coreGeo, coreMat));

// ══════════════════════════════════════════════════
//  RADIAL WEDGE RING TEXTURE (simplified, stable)
// ══════════════════════════════════════════════════
function createWedgeRingTexture(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const cx = size / 2, cy = size / 2;
  const R = size / 2;

  // 1. Fill entirely black
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, size, size);

  // 2. White center cavity
  const cavityR = R * 0.28;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  // Slightly irregular cavity edge
  const cavityN = 40;
  for (let i = 0; i <= cavityN; i++) {
    const a = (i / cavityN) * Math.PI * 2;
    const r = cavityR + Math.sin(i * 3.7) * cavityR * 0.04 + Math.cos(i * 7.1) * cavityR * 0.03;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();

  // 3. Eight white radial channels with slight arc
  const SECTOR_COUNT = 8;
  const sectorAngle = (Math.PI * 2) / SECTOR_COUNT;

  for (let s = 0; s < SECTOR_COUNT; s++) {
    const baseAngle = s * sectorAngle;
    const halfWidth = sectorAngle * 0.22; // channel width

    ctx.fillStyle = '#ffffff';
    ctx.beginPath();

    const steps = 40;
    // Outward along left edge
    for (let i = 0; i <= steps; i++) {
      const frac = i / steps;
      const r = cavityR + frac * (R - cavityR);
      // Slight arc: channels bow in one direction
      const arc = Math.sin(frac * Math.PI) * 0.10;
      const a = baseAngle - halfWidth + arc;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    // Inward along right edge
    for (let i = steps; i >= 0; i--) {
      const frac = i / steps;
      const r = cavityR + frac * (R - cavityR);
      const arc = Math.sin(frac * Math.PI) * 0.10;
      const a = baseAngle + halfWidth + arc;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  // 4. Hand-drawn irregular outer edge
  // Clip to a slightly wobbly circle to give the outer rim a hand-drawn feel
  ctx.globalCompositeOperation = 'destination-in';
  ctx.beginPath();
  const edgeN = 60;
  for (let i = 0; i <= edgeN; i++) {
    const a = (i / edgeN) * Math.PI * 2;
    const wobble = 1 + Math.sin(i * 2.3) * 0.015 + Math.cos(i * 5.7) * 0.012 + Math.sin(i * 11.1) * 0.008;
    const r = R * wobble;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();

  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ══════════════════════════════════════════════════
//  TWO PATTERNED RINGS — as separate groups outside starGroup
//  so occlusion works correctly vs orbit lines
// ══════════════════════════════════════════════════
const tex = createWedgeRingTexture(1024);

const ringDefs = [
  { innerR: 0.72, outerR: 1.55, tiltX: 0.40, tiltZ: -0.25, rotSpeed: 0.11 },
  { innerR: 1.65, outerR: 2.75, tiltX: -0.30, tiltZ: 0.35, rotSpeed: -0.08 },
];

// Rings go in scene directly so depth test works against orbit lines
const ringData = [];

for (const def of ringDefs) {
  const geo = new THREE.RingGeometry(def.innerR, def.outerR, 96);
  geo.rotateX(-Math.PI / 2); // lay flat in XZ

  const mat = new THREE.MeshBasicMaterial({
    map: tex,
    side: THREE.DoubleSide,
    transparent: false,  // opaque — depth writes properly
    depthWrite: true,
    depthTest: true
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(starGroup.position); // same center as star
  mesh.rotation.x = def.tiltX;
  mesh.rotation.z = def.tiltZ;
  mesh.renderOrder = 1;
  scene.add(mesh);

  ringData.push({ mesh, rotSpeed: def.rotSpeed, tiltX: def.tiltX, tiltZ: def.tiltZ });
}

// ══════════════════════════════════════════════════
//  SMOOTH SURFACE CURVES
// ══════════════════════════════════════════════════
const CURVE_COUNT = 7;
const CURVE_PTS = 120;
const curveLines = [];
const curveData = [];

function smoothNoise3D(x, y, z, harmonics) {
  let v = 0;
  for (const h of harmonics) v += Math.sin(x * h.fx + y * h.fy + z * h.fz + h.phase) * h.amp;
  return v;
}

function makeHarmonics(seed) {
  const h = [];
  for (let i = 0; i < 4; i++) {
    h.push({
      fx: 1.3 + seed * 0.7 + i * 0.5, fy: 2.1 + seed * 1.1 + i * 0.3,
      fz: 1.7 + seed * 0.9 + i * 0.7, phase: seed * 6.28 + i * 1.57,
      amp: 0.35 + Math.random() * 0.4
    });
  }
  return h;
}

for (let ci = 0; ci < CURVE_COUNT; ci++) {
  const axis = new THREE.Vector3(Math.random()*2-1, Math.random()*2-1, Math.random()*2-1).normalize();
  const perp = new THREE.Vector3(1,0,0);
  if (Math.abs(axis.dot(perp)) > 0.9) perp.set(0,1,0);
  const u = new THREE.Vector3().crossVectors(axis, perp).normalize();
  const v = new THREE.Vector3().crossVectors(axis, u).normalize();
  const seed = ci / CURVE_COUNT;
  const harmonics = makeHarmonics(seed);
  const phase = Math.random() * Math.PI * 2;
  const perturbStrength = 0.04 + Math.random() * 0.07;
  const precessionSpeed = 0.03 + Math.random() * 0.08;
  const positions = new Float32Array(CURVE_PTS * 3);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.LineBasicMaterial({
    color: COLOR_CURVE, transparent: true, opacity: 0.28 + Math.random() * 0.2, depthTest: true
  });
  const line = new THREE.Line(geo, mat);
  line.renderOrder = 2; line.frustumCulled = false;
  starGroup.add(line);
  curveLines.push(line);
  curveData.push({ axis, u, v, phase, precessionSpeed, harmonics, perturbStrength, positions });
}

// ══════════════════════════════════════════════════
//  RAY SYSTEM
// ══════════════════════════════════════════════════
const RAY_COUNT = 22;
const RAY_SPHERE_R = 0.0;
const RAY_MAX_DIST = 14.0;
const RAY_MAX_AGE = 3.8;
const RAY_RADIUS = 0.012;

const rayGroup = new THREE.Group();
rayGroup.renderOrder = 3;
starGroup.add(rayGroup);

const fiboDirs=[];
const phi_g=Math.PI*(3-Math.sqrt(5));
for(let i=0;i<80;i++){
  const y=1-(i/79)*2, rAtY=Math.sqrt(1-y*y), theta=phi_g*i;
  fiboDirs.push(new THREE.Vector3(Math.cos(theta)*rAtY, y, Math.sin(theta)*rAtY).normalize());
}

function easeInQuart(t){return t*t*t*t;}

const rays=[];
const _quat=new THREE.Quaternion();
const _yAxis=new THREE.Vector3(0,1,0);
const _tempP=new THREE.Vector3();
const cylTemplateGeo = new THREE.CylinderGeometry(RAY_RADIUS, RAY_RADIUS, 1, 6, 1);

function spawnRay(i){
  const dir=fiboDirs[i%80].clone();
  dir.x+=(Math.random()-0.5)*0.15; dir.y+=(Math.random()-0.5)*0.15; dir.z+=(Math.random()-0.5)*0.15;
  dir.normalize();
  const mat=new THREE.MeshBasicMaterial({color:COLOR_RAY,transparent:true,opacity:0,depthTest:true});
  const mesh=new THREE.Mesh(cylTemplateGeo, mat);
  mesh.renderOrder=3; mesh.frustumCulled=false;
  rayGroup.add(mesh);
  return {mesh,mat,dir,age:Math.random()*RAY_MAX_AGE,maxAge:RAY_MAX_AGE*(0.8+Math.random()*0.4)};
}
for(let i=0;i<RAY_COUNT;i++) rays.push(spawnRay(i));

// ══════════════════════════════════════════════════
//  PARTICLE SYSTEM
// ══════════════════════════════════════════════════
const PARTICLE_COUNT = 20;
const PARTICLE_MAX_DIST = 12.0;
const PARTICLE_MAX_AGE = 3.2;
const TRAIL_LENGTH = 14;

const particleGroup = new THREE.Group();
particleGroup.renderOrder = 4;
starGroup.add(particleGroup);

const dotCanvas=document.createElement('canvas');
dotCanvas.width=32; dotCanvas.height=32;
const dctx=dotCanvas.getContext('2d');
const dgrad=dctx.createRadialGradient(16,16,0,16,16,16);
dgrad.addColorStop(0,'rgba(30,40,50,1.0)');
dgrad.addColorStop(0.2,'rgba(25,35,45,0.7)');
dgrad.addColorStop(0.5,'rgba(20,28,38,0.15)');
dgrad.addColorStop(1,'rgba(0,0,0,0)');
dctx.fillStyle=dgrad; dctx.fillRect(0,0,32,32);
const dotTex=new THREE.CanvasTexture(dotCanvas);

const particles=[];

function spawnParticle(i){
  const dir=fiboDirs[i%80].clone();
  dir.x+=(Math.random()-0.5)*0.3; dir.y+=(Math.random()-0.5)*0.3; dir.z+=(Math.random()-0.5)*0.3;
  dir.normalize();
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array([dir.x*RAY_SPHERE_R,dir.y*RAY_SPHERE_R,dir.z*RAY_SPHERE_R]),3));
  const mat=new THREE.PointsMaterial({
    map:dotTex,color:COLOR_PARTICLE,size:0.06,
    blending:THREE.AdditiveBlending,transparent:true,opacity:0,
    depthWrite:false,depthTest:true
  });
  const point=new THREE.Points(geo,mat);
  point.renderOrder=4; point.frustumCulled=false;
  particleGroup.add(point);
  const trailArr=new Float32Array(TRAIL_LENGTH*3);
  const s=dir.clone().multiplyScalar(RAY_SPHERE_R);
  for(let j=0;j<TRAIL_LENGTH;j++){trailArr[j*3]=s.x;trailArr[j*3+1]=s.y;trailArr[j*3+2]=s.z;}
  const trailGeo=new THREE.BufferGeometry();
  trailGeo.setAttribute('position',new THREE.BufferAttribute(trailArr,3));
  const trailMat=new THREE.LineBasicMaterial({color:COLOR_PARTICLE,transparent:true,opacity:0,depthTest:true});
  const trail=new THREE.Line(trailGeo,trailMat);
  trail.renderOrder=3; trail.frustumCulled=false;
  particleGroup.add(trail);
  return {point,trail,trailArr,trailMat,dir,age:Math.random()*PARTICLE_MAX_AGE,maxAge:PARTICLE_MAX_AGE*(0.8+Math.random()*0.4)};
}
for(let i=0;i<PARTICLE_COUNT;i++) particles.push(spawnParticle(i));

// ══════════════════════════════════════════════════
//  ANIMATION
// ══════════════════════════════════════════════════
const clock=new THREE.Clock();
const _ptOnSphere=new THREE.Vector3(), _ptNormal=new THREE.Vector3(), _ptOffset=new THREE.Vector3();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.1);
  const t=clock.getElapsedTime();

  starGroup.rotation.y += dt * 0.06;

  // ── Patterned rings — independent rotation, track star position ──
  for (const rd of ringData) {
    rd.mesh.position.copy(starGroup.position);
    // Apply base tilt + time-based rotation
    rd.mesh.rotation.set(rd.tiltX, rd.mesh.rotation.y + dt * rd.rotSpeed, rd.tiltZ);
  }

  // ── Smooth surface curves ──────────────────
  for (let ci = 0; ci < CURVE_COUNT; ci++) {
    const cd = curveData[ci];
    const { phase, precessionSpeed, harmonics, perturbStrength, positions } = cd;
    const arr = positions;
    const precessionAngle = t * precessionSpeed;
    const cosP = Math.cos(precessionAngle), sinP = Math.sin(precessionAngle);
    const uRot = cd.u.clone().multiplyScalar(cosP).addScaledVector(
      new THREE.Vector3().crossVectors(cd.axis, cd.u), sinP);
    const vRot = cd.v.clone().multiplyScalar(cosP).addScaledVector(
      new THREE.Vector3().crossVectors(cd.axis, cd.v), sinP);

    for (let i = 0; i < CURVE_PTS; i++) {
      const frac = i / (CURVE_PTS - 1);
      const angle = frac * Math.PI * 2;
      const cosA = Math.cos(angle), sinA = Math.sin(angle);
      _ptOnSphere.set(uRot.x*cosA+vRot.x*sinA, uRot.y*cosA+vRot.y*sinA, uRot.z*cosA+vRot.z*sinA).normalize();
      const nx=_ptOnSphere.x, ny=_ptOnSphere.y, nz=_ptOnSphere.z;
      const noiseVal = smoothNoise3D(nx, ny, nz + t*0.15, harmonics);
      _ptNormal.copy(_ptOnSphere).normalize();
      const perturb = noiseVal * perturbStrength;
      const burst = Math.max(0, Math.sin(t*0.3 + ci*1.8 + frac*4.0 + phase))*0.1;
      const totalPerturb = perturb + burst*perturbStrength*2.0;
      _ptOffset.copy(_ptOnSphere).multiplyScalar(SPHERE_R).addScaledVector(_ptNormal, totalPerturb);
      const wobble = Math.sin(t*0.5 + frac*6.0 + phase)*0.012;
      const tangent = new THREE.Vector3().crossVectors(_ptNormal, uRot).normalize();
      _ptOffset.addScaledVector(tangent, wobble);
      arr[i*3]=_ptOffset.x; arr[i*3+1]=_ptOffset.y; arr[i*3+2]=_ptOffset.z;
    }
    curveLines[ci].geometry.attributes.position.needsUpdate=true;
    curveLines[ci].material.opacity = 0.24 + Math.sin(t*0.4+phase)*0.06;
  }

  // ── Rays ────────────────────────────────────
  for (const ray of rays) {
    ray.age += dt;
    if (ray.age >= ray.maxAge) {
      ray.age=0; ray.maxAge=RAY_MAX_AGE*(0.8+Math.random()*0.4);
      const idx=Math.floor(Math.random()*80);
      ray.dir.copy(fiboDirs[idx]);
      ray.dir.x+=(Math.random()-0.5)*0.15; ray.dir.y+=(Math.random()-0.5)*0.15; ray.dir.z+=(Math.random()-0.5)*0.15;
      ray.dir.normalize();
    }
    const tN=ray.age/ray.maxAge;
    const eased=easeInQuart(tN);
    const dist=RAY_SPHERE_R+eased*RAY_MAX_DIST;
    const len=dist-RAY_SPHERE_R;
    const distFade=1/(1+eased*4.5);
    const lifeFade=tN>0.85?1-(tN-0.85)/0.15:1;
    ray.mat.opacity=distFade*lifeFade*0.5;
    _tempP.copy(ray.dir).multiplyScalar(RAY_SPHERE_R+len*0.5);
    ray.mesh.position.copy(_tempP);
    ray.mesh.scale.set(1, Math.max(len,0.001), 1);
    _quat.setFromUnitVectors(_yAxis, ray.dir);
    ray.mesh.setRotationFromQuaternion(_quat);
  }

  // ── Particles ───────────────────────────────
  for (const p of particles) {
    p.age+=dt;
    if(p.age>=p.maxAge){
      p.age=0; p.maxAge=PARTICLE_MAX_AGE*(0.8+Math.random()*0.4);
      const idx=Math.floor(Math.random()*80);
      p.dir.copy(fiboDirs[idx]);
      p.dir.x+=(Math.random()-0.5)*0.3; p.dir.y+=(Math.random()-0.5)*0.3; p.dir.z+=(Math.random()-0.5)*0.3;
      p.dir.normalize();
      const s=p.dir.clone().multiplyScalar(RAY_SPHERE_R);
      for(let j=0;j<TRAIL_LENGTH;j++){p.trailArr[j*3]=s.x;p.trailArr[j*3+1]=s.y;p.trailArr[j*3+2]=s.z;}
    }
    const tN=p.age/p.maxAge;
    const eased=easeInQuart(tN);
    const dist=RAY_SPHERE_R+eased*PARTICLE_MAX_DIST;
    const px=p.dir.x*dist, py=p.dir.y*dist, pz=p.dir.z*dist;
    p.point.geometry.attributes.position.array[0]=px;
    p.point.geometry.attributes.position.array[1]=py;
    p.point.geometry.attributes.position.array[2]=pz;
    p.point.geometry.attributes.position.needsUpdate=true;
    for(let j=TRAIL_LENGTH-1;j>0;j--){
      p.trailArr[j*3]=p.trailArr[(j-1)*3];
      p.trailArr[j*3+1]=p.trailArr[(j-1)*3+1];
      p.trailArr[j*3+2]=p.trailArr[(j-1)*3+2];
    }
    p.trailArr[0]=px; p.trailArr[1]=py; p.trailArr[2]=pz;
    p.trail.geometry.attributes.position.needsUpdate=true;
    const distFade=1/(1+eased*3.8);
    const lifeFade=tN>0.85?1-(tN-0.85)/0.15:1;
    p.point.material.opacity=distFade*lifeFade*0.55;
    p.trailMat.opacity=distFade*lifeFade*0.22;
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
