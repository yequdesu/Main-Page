# ============================================================
# Production: nginx serves built static files
# Run: npm run build   (output → dist/)
# ============================================================
server {
    listen 80;
    server_name 10.0.0.2 _;

    root /home/yequdesu/YeQu-Main-Page/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API stats (Python backend)
    location /api/stats {
        proxy_pass http://127.0.0.1:9999/stats;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache off;
        expires -1;
    }
}
